name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite (SQLite)
        env:
          ENVIRONMENT: test
        run: pytest -q --junitxml=pytest.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: pytest.xml

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    if: ${{ secrets.SUPABASE_TEST_DB_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run PostGIS integration tests
        env:
          UNISTAY_INTEGRATION_DB_URL: ${{ secrets.SUPABASE_TEST_DB_URL }}
          ENVIRONMENT: test
        run: pytest tests/test_postgis_integration.py -q -v