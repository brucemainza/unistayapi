services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unistay}
      POSTGRES_USER: ${POSTGRES_USER:-unistay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unistay}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unistay} -d ${POSTGRES_DB:-unistay}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://unistay:unistay@db:5432/unistay}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400}
      LENCO_MOCK: ${LENCO_MOCK:-false}
      LENCO_API_KEY: ${LENCO_API_KEY}
      LENCO_BASE_URL: ${LENCO_BASE_URL:-https://api.lenco.co}
      LENCO_WEBHOOK_SECRET: ${LENCO_WEBHOOK_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      GOOGLE_MAPS_SERVER_KEY: ${GOOGLE_MAPS_SERVER_KEY}
      GOOGLE_MAPS_SIGNING_SECRET: ${GOOGLE_MAPS_SIGNING_SECRET}
      GOOGLE_MAPS_PLACES_REGION: ${GOOGLE_MAPS_PLACES_REGION:-ZM}
      REDIS_URL: ${REDIS_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-UniStay <no-reply@mainzabruce.online>}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-600}
      OTP_RESEND_COOLDOWN: ${OTP_RESEND_COOLDOWN:-60}
      OTP_MAX_ATTEMPTS: ${OTP_MAX_ATTEMPTS:-5}
      MOCK_OTP_BYPASS: ${MOCK_OTP_BYPASS:-false}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-unistay}
      CLOUDINARY_SECURE: ${CLOUDINARY_SECURE:-true}
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
